basePath: /api/v1
definitions:
  add_fcm_token.Input:
    properties:
      fcmToken:
        type: string
    required:
    - fcmToken
    type: object
  add_fcm_token.Output:
    properties:
      success:
        type: boolean
    type: object
  create_genre.Input:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  create_genre.Output:
    properties:
      genre:
        $ref: '#/definitions/domain.Genre'
    type: object
  delete_fcm_token.Output:
    properties:
      success:
        type: boolean
    type: object
  delete_genre.Output:
    properties:
      success:
        type: boolean
    type: object
  domain.Author:
    properties:
      books:
        items:
          $ref: '#/definitions/domain.Book'
        type: array
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      personalBooks:
        items:
          $ref: '#/definitions/domain.PersonalBook'
        type: array
    type: object
  domain.BasicAccount:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      isVerified:
        type: boolean
      verifyLink:
        type: string
    type: object
  domain.Book:
    properties:
      author:
        $ref: '#/definitions/domain.Author'
      bookChapters:
        items:
          $ref: '#/definitions/domain.BookChapter'
        type: array
      coverUrl:
        type: string
      createdAt:
        type: string
      genres:
        items:
          $ref: '#/definitions/domain.Genre'
        type: array
      id:
        type: string
      originalLang:
        type: string
      processStatus:
        $ref: '#/definitions/domain.ProcessStatus'
      title:
        type: string
      translatedLang:
        type: string
    type: object
  domain.BookChapter:
    properties:
      book:
        $ref: '#/definitions/domain.Book'
      contentURL:
        type: string
      createdAt:
        type: string
      id:
        type: string
      order:
        type: integer
      title:
        type: string
      translatedTitle:
        type: string
    type: object
  domain.DictionaryExample:
    properties:
      dictionaryID:
        type: string
      id:
        type: string
      text:
        type: string
      translatedText:
        type: string
      wordPositionEnd:
        type: integer
      wordPositionStart:
        type: integer
    type: object
  domain.DictionaryWord:
    properties:
      examples:
        items:
          $ref: '#/definitions/domain.DictionaryExample'
        type: array
      fromLangCode:
        type: string
      id:
        type: string
      partOfSpeech:
        type: string
      text:
        type: string
      toLangCode:
        type: string
      transcription:
        type: string
      translations:
        items:
          type: string
        type: array
    type: object
  domain.Genre:
    properties:
      books:
        items:
          $ref: '#/definitions/domain.Book'
        type: array
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      personalBooks:
        items:
          $ref: '#/definitions/domain.PersonalBook'
        type: array
    type: object
  domain.GoogleAccount:
    properties:
      createdAt:
        type: string
      email:
        type: string
      emailVerified:
        type: boolean
      id:
        type: string
      name:
        type: string
      picture:
        type: string
      sub:
        type: string
    type: object
  domain.JsonB:
    additionalProperties: {}
    type: object
  domain.PersonalBook:
    properties:
      author:
        $ref: '#/definitions/domain.Author'
      coverUrl:
        type: string
      createdAt:
        type: string
      genres:
        items:
          $ref: '#/definitions/domain.Genre'
        type: array
      id:
        type: string
      originalLang:
        type: string
      personalBookChapters:
        items:
          $ref: '#/definitions/domain.PersonalBookChapter'
        type: array
      processStatus:
        $ref: '#/definitions/domain.ProcessStatus'
      title:
        type: string
      translatedLang:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  domain.PersonalBookChapter:
    properties:
      contentUrl:
        type: string
      createdAt:
        type: string
      id:
        type: string
      order:
        type: integer
      personalBook:
        $ref: '#/definitions/domain.PersonalBook'
      title:
        type: string
      translatedTitle:
        type: string
    type: object
  domain.ProcessStatus:
    enum:
    - in_progress
    - completed
    - failed
    type: string
    x-enum-varnames:
    - ProcessStatusInProgress
    - ProcessStatusCompleted
    - ProcessStatusFailed
  domain.User:
    properties:
      basicAccount:
        $ref: '#/definitions/domain.BasicAccount'
      createdAt:
        type: string
      googleAccount:
        $ref: '#/definitions/domain.GoogleAccount'
      id:
        type: string
      isAdmin:
        type: boolean
      isVIP:
        type: boolean
      metadata:
        $ref: '#/definitions/domain.JsonB'
      personalBooks:
        items:
          $ref: '#/definitions/domain.PersonalBook'
        type: array
    type: object
  get_book.Output:
    properties:
      book:
        $ref: '#/definitions/domain.Book'
    type: object
  get_books.Output:
    properties:
      books:
        items:
          $ref: '#/definitions/domain.Book'
        type: array
    type: object
  get_genre.Output:
    properties:
      genre:
        $ref: '#/definitions/domain.Genre'
    type: object
  get_genres.Output:
    properties:
      genres:
        items:
          $ref: '#/definitions/domain.Genre'
        type: array
    type: object
  get_personal_user_book.Output:
    properties:
      book:
        $ref: '#/definitions/domain.PersonalBook'
    type: object
  get_personal_user_books.Output:
    properties:
      books:
        items:
          $ref: '#/definitions/domain.PersonalBook'
        type: array
    type: object
  google_login.Input:
    properties:
      idToken:
        type: string
    required:
    - idToken
    type: object
  google_login.Output:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  login.Input:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  login.Output:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  logout.Output:
    properties:
      success:
        type: boolean
    type: object
  lookup.Input:
    properties:
      fromLang:
        type: string
      text:
        type: string
      toLang:
        type: string
    required:
    - fromLang
    - text
    - toLang
    type: object
  lookup.Output:
    properties:
      words:
        items:
          $ref: '#/definitions/domain.DictionaryWord'
        type: array
    type: object
  me.Output:
    properties:
      user:
        $ref: '#/definitions/domain.User'
    type: object
  metadata.Input:
    properties:
      metadata:
        $ref: '#/definitions/domain.JsonB'
    required:
    - metadata
    type: object
  metadata.Output:
    properties:
      user:
        $ref: '#/definitions/domain.User'
    type: object
  notification.Input:
    properties:
      body:
        type: string
      title:
        type: string
    type: object
  refresh.Input:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  refresh.Output:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  register.Input:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  register.Output:
    properties:
      success:
        type: boolean
    type: object
  translate_book.Output:
    properties:
      book:
        $ref: '#/definitions/domain.Book'
      messageAboutTranslate:
        type: string
    type: object
  translate_personal_book.Output:
    properties:
      book:
        $ref: '#/definitions/domain.PersonalBook'
      messageAboutTranslate:
        type: string
    type: object
  update_book.Output:
    properties:
      book:
        $ref: '#/definitions/domain.Book'
    type: object
  update_personal_user_book.Output:
    properties:
      book:
        $ref: '#/definitions/domain.PersonalBook'
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
info:
  contact: {}
  title: Nim2Book api
  version: "1.0"
paths:
  /auth/google:
    post:
      consumes:
      - application/json
      parameters:
      - description: body
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/google_login.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/google_login.Output'
      summary: GoogleLogin user
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: body
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/login.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/login.Output'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/logout.Output'
      summary: Logout user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: body
        in: body
        name: data
        schema:
          $ref: '#/definitions/refresh.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/refresh.Output'
      summary: Refresh user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: body
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/register.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/register.Output'
      summary: Register user
      tags:
      - auth
  /books:
    get:
      parameters:
      - description: Author filter
        in: query
        name: author
        type: string
      - description: Title filter
        in: query
        name: title
        type: string
      - description: Genre ID filter
        in: query
        name: genreId
        type: string
      - description: Page number
        in: query
        name: page
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/get_books.Output'
      summary: Get books
      tags:
      - book
  /books/{book_id}/chapters/{chapter_number}:
    get:
      parameters:
      - description: Chapter path
        in: query
        name: path
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Chapter content
          schema:
            type: string
      summary: Get chapter content
      tags:
      - book
  /books/{id}:
    get:
      parameters:
      - description: Book id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/get_book.Output'
      summary: Get book by id
      tags:
      - book
    put:
      parameters:
      - description: Cover file
        in: formData
        name: cover
        type: file
      - description: Author book
        in: formData
        name: author
        type: string
      - description: Title book
        in: formData
        name: title
        type: string
      - description: Book id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/update_book.Output'
      security:
      - BearerAuth: []
      summary: Update book
      tags:
      - book
  /dictionary/lookup:
    post:
      consumes:
      - application/json
      parameters:
      - description: body
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/lookup.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lookup.Output'
      summary: Get list translate from dictionary
      tags:
      - dictionary
  /fcm-tokens:
    post:
      consumes:
      - application/json
      parameters:
      - description: FCM token
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/add_fcm_token.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/add_fcm_token.Output'
      security:
      - BearerAuth: []
      summary: Add FCM token
      tags:
      - fcm-token
  /fcm-tokens/{token}:
    delete:
      parameters:
      - description: FCM token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/delete_fcm_token.Output'
      security:
      - BearerAuth: []
      summary: Delete FCM token
      tags:
      - fcm-token
  /files/public:
    get:
      parameters:
      - description: path
        in: query
        name: path
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Get file data
      tags:
      - file
  /genres:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/get_genres.Output'
      summary: Get all genres
      tags:
      - genre
    post:
      consumes:
      - application/json
      parameters:
      - description: Genre data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/create_genre.Input'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/create_genre.Output'
      security:
      - BearerAuth: []
      summary: Create genre
      tags:
      - genre
  /genres/{id}:
    delete:
      parameters:
      - description: Genre id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/delete_genre.Output'
      security:
      - BearerAuth: []
      summary: Delete genre
      tags:
      - genre
    get:
      parameters:
      - description: Genre id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/get_genre.Output'
      summary: Get genre by id
      tags:
      - genre
  /notifications:
    post:
      consumes:
      - application/json
      parameters:
      - description: body
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/notification.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Notification test
      tags:
      - notification
  /personal-user-books:
    get:
      parameters:
      - description: Author
        in: query
        name: author
        type: string
      - description: Title
        in: query
        name: title
        type: string
      - description: Genre ID
        in: query
        name: genreId
        type: string
      - description: Page
        in: query
        name: page
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/get_personal_user_books.Output'
      security:
      - BearerAuth: []
      summary: Get personal user books
      tags:
      - personal-user-book
  /personal-user-books/{id}:
    get:
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/get_personal_user_book.Output'
      security:
      - BearerAuth: []
      summary: Get personal user book
      tags:
      - personal-user-book
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      - description: Author
        in: formData
        name: author
        type: string
      - description: Title
        in: formData
        name: title
        type: string
      - description: Cover
        in: formData
        name: cover
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/update_personal_user_book.Output'
      security:
      - BearerAuth: []
      summary: Update personal user book
      tags:
      - personal-user-book
  /translate/book:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Файл книги
        in: formData
        name: file
        required: true
        type: file
      - description: Исходный язык
        in: formData
        name: from
        required: true
        type: string
      - description: Целевой язык
        in: formData
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/translate_book.Output'
      security:
      - BearerAuth: []
      summary: Перевести книгу
      tags:
      - translate
  /translate/personal-user-book:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Файл книги
        in: formData
        name: file
        required: true
        type: file
      - description: Исходный язык
        in: formData
        name: from
        required: true
        type: string
      - description: Целевой язык
        in: formData
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/translate_personal_book.Output'
      security:
      - BearerAuth: []
      summary: Перевести личную книгу пользователя
      tags:
      - translate
  /users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/me.Output'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - user
  /users/metadata:
    put:
      consumes:
      - application/json
      parameters:
      - description: Metadata
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/metadata.Input'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/metadata.Output'
      security:
      - BearerAuth: []
      summary: Update user metadata
      tags:
      - user
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
